# Shared publishing configuration for the public Brikk libraries.
# Applied by each publishable module via `apply: [ //publish.module-template.yaml ]`.
#
# Credentials are read from the project-root `.env` file (gitignored). It must contain
# the GitHub PAT under the keys `brikk.gpr.user` / `brikk.gpr.key`. The same keys are
# also present in `~/.gradle/gradle.properties` on dev machines.
#
# NOTE (KMP): only JVM libraries publish fully-consumable artifacts today. For the
# `kmp/lib` modules, consumers should depend on the per-platform JVM artifact, e.g.
#   dev.brikk.house:brikk-sql-jvm:0.1.0-SNAPSHOT
repositories:
  # The public GitHub Packages Maven repo. Publish with: `./kotlin publish brikkPublic`
  - id: brikkPublic
    url: https://maven.pkg.github.com/brikk/public-maven
    publish: true
    credentials:
      file: .env
      usernameKey: brikk.gpr.user
      passwordKey: brikk.gpr.key
  # Local install for testing the publication pipeline: `./kotlin publish mavenLocal`
  - url: mavenLocal
    publish: true

settings:
  publishing:
    enabled: true
    group: dev.brikk.house
    version: 0.1.0-SNAPSHOT
